<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoofRoute">
  <meta name="description" content="Field sales canvassing CRM for roofing sales reps">
  <link rel="manifest" href="manifest.json">
  <title>RoofRoute</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKkexid7z0E9dPgUYTLx-V3LJ5dfdosfs"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100dvh; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: auto; will-change: transform; padding-bottom: 20px; }
    .bottom-nav { flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 40; position: relative; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 50; display: flex; align-items: flex-end;
      animation: fadeIn 0.15s ease;
    }
    .modal-sheet {
      width: 100%; max-height: 92vh; overflow-y: auto;
      border-radius: 20px 20px 0 0; background: white;
      animation: slideUp 0.2s ease;
    }
    .modal-full {
      position: fixed; inset: 0; background: white; z-index: 50;
      display: flex; flex-direction: column;
      animation: slideUp 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input, select, textarea { font-size: 16px !important; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb !important; }
    .card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); }
    .btn {
      min-height: 50px; border-radius: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; padding: 12px 16px; font-size: 15px;
      font-family: inherit; transition: opacity 0.1s; letter-spacing: -0.1px;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-orange { background: #f97316; color: white; }
    .btn-green { background: #16a34a; color: white; }
    .btn-red { background: #dc2626; color: white; }
    .btn-yellow { background: #d97706; color: white; }
    .btn-gray { background: #e5e7eb; color: #374151; }
    .btn-outline { background: white; border: 2px solid #e5e7eb !important; color: #374151; }
    .field-input {
      width: 100%; padding: 13px 14px; font-size: 16px;
      border: 2px solid #e5e7eb; border-radius: 12px;
      background: #f8fafc; font-family: inherit;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: #2563eb; background: white; }
    ::-webkit-scrollbar { display: none; }
    .pill {
      display: inline-flex; align-items: center; padding: 5px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
      white-space: nowrap;
    }
    .stat-box { cursor: pointer; transition: all 0.15s ease; }
    .stat-box:active { transform: scale(0.98); opacity: 0.8; }
    .business-card-image { max-width: 100%; height: auto; border-radius: 12px; margin: 12px 0; max-height: 300px; object-fit: contain; background: #f1f5f9; padding: 8px; border: 1px solid #e2e8f0; }
    .search-result-card { 
      background: white; border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px; 
      margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
    }
    .search-result-card:active { background: #f0f9ff; border-color: #2563eb; }
    .search-result-card.selected { background: #dbeafe; border-color: #2563eb; }
    .loading-spinner { 
      display: inline-block; width: 16px; height: 16px; 
      border: 2px solid #e5e7eb; border-top-color: #2563eb; 
      border-radius: 50%; animation: spin 0.8s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const STATUS_TYPES = [
  'Not Visited','No Contact','No One Available','Gatekeeper Only',
  'Warm Lead','Hot Lead','Follow Up','Not Interested',
  'Customer','Revisit Later','Wrong Business','Not Canvassable'
];
const ACCESS_TYPES = [
  'Walk-In Office','Warehouse Office','Gate Access',
  'Appointment Required','Front Desk','Residential Office',
  'Unknown','Not Canvassable'
];
const INTEREST_LEVELS = ['Cold','Warm','Hot','Not Interested'];
const CONTACT_TITLES = ['Owner','Estimator','Purchasing','Office','Sales','Other'];
const NO_SPOKE_OUTCOMES = [
  'No One Available','Gatekeeper Only','No Contact',
  'Revisit Later','Not Canvassable','Wrong Business'
];

const STATUS_META = {
  'Hot Lead':        { color: '#dc2626', bg: '#fef2f2', border: '#fca5a5' },
  'Warm Lead':       { color: '#d97706', bg: '#fffbeb', border: '#fde68a' },
  'Customer':        { color: '#15803d', bg: '#f0fdf4', border: '#86efac' },
  'Follow Up':       { color: '#2563eb', bg: '#eff6ff', border: '#93c5fd' },
  'Not Interested':  { color: '#6b7280', bg: '#f9fafb', border: '#d1d5db' },
  'Not Visited':     { color: '#64748b', bg: '#f8fafc', border: '#e2e8f0' },
  'No Contact':      { color: '#64748b', bg: '#f8fafc', border: '#e2e8f0' },
  'No One Available':{ color: '#64748b', bg: '#f8fafc', border: '#e2e8f0' },
  'Gatekeeper Only': { color: '#7c3aed', bg: '#f5f3ff', border: '#c4b5fd' },
  'Revisit Later':   { color: '#0891b2', bg: '#ecfeff', border: '#67e8f9' },
  'Wrong Business':  { color: '#374151', bg: '#f9fafb', border: '#d1d5db' },
  'Not Canvassable': { color: '#374151', bg: '#f9fafb', border: '#d1d5db' },
};

const STATUS_PRIORITY = {
  'Hot Lead':0,'Warm Lead':1,'Follow Up':2,'Customer':3,
  'Revisit Later':4,'Gatekeeper Only':5,'No Contact':6,
  'No One Available':7,'Not Visited':8,'Not Interested':9,
  'Wrong Business':10,'Not Canvassable':11
};

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function load(key, def) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function daysAgo(d) { if(!d) return null; return Math.floor((Date.now()-new Date(d).getTime())/(864e5)); }
function fmtDate(d) { if(!d) return ''; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtShort(d) { if(!d) return ''; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtTime(d) { if(!d) return ''; return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function statusColor(s) { return (STATUS_META[s]||{color:'#64748b'}).color; }
function statusBg(s) { return (STATUS_META[s]||{bg:'#f8fafc'}).bg; }
function statusBorder(s) { return (STATUS_META[s]||{border:'#e2e8f0'}).border; }

// ─────────────────────────────────────────────
// SEARCH FUNCTIONS
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// NEW DIRECT GOOGLE MAPS PLACES SEARCH
// ─────────────────────────────────────────────
async function searchRoofingCompanies(city, state) {
  return new Promise((resolve, reject) => {
    // Ensure the Google Maps library is loaded
    if (!window.google || !window.google.maps || !window.google.maps.places) {
      reject(new Error("Google Maps library not fully loaded yet."));
      return;
    }

    // Create a temporary hidden map div for the service to hook into if needed
    const dummyElem = document.createElement('div');
    const service = new google.maps.places.PlacesService(dummyElem);

    // This tells Google exactly what to search for on Maps
    const request = {
      query: `roofing companies in ${city}, ${state}`,
      type: ['roofing_contractor']
    };

    // Execute the live Google Maps text search
    service.textSearch(request, (results, status) => {
      if (status !== google.maps.places.PlacesServiceStatus.OK || !results) {
        console.error("Google Places Error Status:", status);
        resolve([]); // Return empty array so app safely handles no results
        return;
      }

      // Format Google's real data to match your RoofRoute app structure
      const formattedCompanies = results.map(place => {
        // Split address fields out of Google's formatted address string if possible
        const addressParts = place.formatted_address ? place.formatted_address.split(',') : [];
        const street = addressParts[0] || '';

        return {
          id: genId(),
          companyName: place.name,
          streetAddress: street,
          city: city,
          state: state,
          zip: '', // Places textSearch provides a consolidated string; full details can be manually edited later
          phone: '', 
          email: '',
          website: '',
          status: 'Not Visited',
          interest: '',
          supplier: '',
          attemptCount: 0,
          lastVisit: null,
          lastContact: '',
          contactTitle: '',
          notes: 'Added via direct Google Maps search.',
          accessType: 'Unknown',
          priority: 2,
          followUpDate: null,
          // Storing real exact map coordinates for your pins!
          latitude: place.geometry && place.geometry.location ? place.geometry.location.lat() : null,
          longitude: place.geometry && place.geometry.location ? place.geometry.location.lng() : null
        };
      });

      resolve(formattedCompanies);
    });
  });
}


// ─────────────────────────────────────────────
// SEARCH COMPANIES MODAL (WITH INTERACTIVE MAP)
// ─────────────────────────────────────────────
function SearchCompaniesModal({ onClose, onAdd }) {
  const [searchCity, setSearchCity] = useState('');
  const [searchState, setSearchState] = useState('FL');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [selectedResults, setSelectedResults] = useState(new Set());
  
  const mapRef = useRef(null);
  const googleMapInstance = useRef(null);
  const markersRef = useRef([]);

  useEffect(() => {
    if (!window.google || !window.google.maps || !mapRef.current) return;

    // Clear previous pins
    markersRef.current.forEach(marker => marker.setMap(null));
    markersRef.current = [];

    let mapCenter = { lat: 28.0836, lng: -80.6081 };
    let zoomLevel = 10;

    const validCoords = results.filter(c => c.latitude && c.longitude);
    if (validCoords.length > 0) {
      mapCenter = { lat: parseFloat(validCoords[0].latitude), lng: parseFloat(validCoords[0].longitude) };
      zoomLevel = 12;
    }

    if (!googleMapInstance.current) {
      googleMapInstance.current = new window.google.maps.Map(mapRef.current, {
        center: mapCenter,
        zoom: zoomLevel,
        mapTypeControl: false,
        fullscreenControl: false,
        streetViewControl: false
      });
    } else {
      googleMapInstance.current.setCenter(mapCenter);
      googleMapInstance.current.setZoom(zoomLevel);
    }

    results.forEach((company, idx) => {
      const lat = company.latitude ? parseFloat(company.latitude) : (28.0836 + (Math.random() - 0.5) * 0.1);
      const lng = company.longitude ? parseFloat(company.longitude) : (-80.6081 + (Math.random() - 0.5) * 0.1);
      
      company.latitude = lat;
      company.longitude = lng;

      const marker = new window.google.maps.Marker({
        position: { lat, lng },
        map: googleMapInstance.current,
        title: company.companyName,
        animation: window.google.maps.Animation.DROP
      });

      const infoWindow = new window.google.maps.InfoWindow({
        content: `
          <div style="color: #1e293b; padding: 4px; font-family: sans-serif;">
            <h4 style="margin: 0 0 4px; font-weight: 700; font-size: 14px;">${company.companyName}</h4>
            <p style="margin: 0; font-size: 12px; color: #64748b;">${company.streetAddress}</p>
            <p style="margin: 4px 0 0; font-size: 11px; font-weight: bold; color: #2563eb;">Tap listing below to select</p>
          </div>
        `
      });

      marker.addListener('click', () => {
        infoWindow.open(googleMapInstance.current, marker);
      });

      markersRef.current.push(marker);
    });
  }, [results]);

  const handleSearch = async () => {
    if (!searchCity.trim()) {
      setError('Please enter a city name');
      return;
    }
    
    setLoading(true);
    setError('');
    setResults([]);
    setSelectedResults(new Set());
    
    try {
      const companies = await searchRoofingCompanies(searchCity, searchState);
      const sanitized = companies.length > 0 ? companies : generateFallbackCompanies(searchCity, searchState);
      setResults(sanitized);
      if (!sanitized.length) setError('No roofing companies found. Try a different city.');
    } catch (err) {
      const fallback = generateFallbackCompanies(searchCity, searchState);
      setResults(fallback);
    } finally {
      setLoading(false);
    }
  };

  const toggleResult = (idx) => {
    setSelectedResults(prev => {
      const next = new Set(prev);
      if (next.has(idx)) next.delete(idx);
      else next.add(idx);
      return next;
    });
  };

  const handleAddSelected = () => {
    const toAdd = results.filter((_, idx) => selectedResults.has(idx));
    if (toAdd.length) {
      onAdd(toAdd);
      onClose();
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()} style={{ display: 'flex', flexDirection: 'column', height: '90vh' }}>
        <div style={{ padding: '20px 20px 12px', borderBottom: '1px solid #e5e7eb', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
            <h2 style={{ fontSize: '20px', fontWeight: '700', margin: 0 }}>Search Roofing Companies</h2>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer', padding: 0 }}>×</button>
          </div>
          
          <div style={{ marginBottom: '12px' }}>
            <label style={{ display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '6px', color: '#475569' }}>City</label>
            <input 
              type="text"
              className="field-input"
              placeholder="e.g., Melbourne, Tampa, Orlando"
              value={searchCity}
              onChange={e => setSearchCity(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSearch()}
            />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
            <div>
              <select className="field-input" value={searchState} onChange={e => setSearchState(e.target.value)}>
                <option value="FL">Florida</option>
                <option value="CA">California</option>
                <option value="TX">Texas</option>
                <option value="NY">New York</option>
                <option value="PA">Pennsylvania</option>
                <option value="OH">Ohio</option>
              </select>
            </div>
            <div>
              <button onClick={handleSearch} disabled={loading} className="btn btn-primary" style={{ width: '100%' }}>
                {loading ? <span className="loading-spinner" style={{ marginRight: '8px' }}></span> : '🔍 Search City'}
              </button>
            </div>
          </div>
        </div>

        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
          <div 
            ref={mapRef} 
            style={{ 
              width: '100%', 
              height: '260px', 
              background: '#e2e8f0', 
              borderBottom: '2px solid #e2e8f0',
              flexShrink: 0
            }} 
          />

          <div style={{ padding: '16px 20px' }}>
            {error && (
              <div style={{ background: '#fee2e2', color: '#991b1b', padding: '12px', borderRadius: '8px', marginBottom: '16px', fontSize: '14px' }}>
                {error}
              </div>
            )}

            {results.length > 0 && (
              <div>
                <div style={{ fontSize: '13px', fontWeight: '600', color: '#64748b', marginBottom: '12px' }}>
                  Found {results.length} roofers nearby. Tap to save to route list:
                </div>
                {results.map((company, idx) => (
                  <div
                    key={idx}
                    className="search-result-card"
                    style={{ 
                      background: selectedResults.has(idx) ? '#dbeafe' : 'white',
                      borderColor: selectedResults.has(idx) ? '#2563eb' : '#e5e7eb'
                    }}
                    onClick={() => toggleResult(idx)}
                  >
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div style={{ flex: 1, paddingRight: '8px' }}>
                        <div style={{ fontSize: '15px', fontWeight: '600', color: '#1e293b', marginBottom: '4px' }}>
                          {company.companyName}
                        </div>
                        <div style={{ fontSize: '13px', color: '#64748b' }}>
                          {company.streetAddress} • {company.city}
                        </div>
                      </div>
                      <div style={{ fontSize: '20px', color: '#2563eb', flexShrink: 0 }}>
                        {selectedResults.has(idx) ? '🔵' : '⚪'}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div style={{ padding: '16px 20px', borderTop: '1px solid #e5e7eb', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', flexShrink: 0, background: 'white' }}>
          <button onClick={onClose} className="btn btn-outline">Close</button>
          <button 
            onClick={handleAddSelected}
            disabled={selectedResults.size === 0}
            className="btn btn-primary"
            style={{ opacity: selectedResults.size === 0 ? 0.5 : 1 }}
          >
            Import Selected ({selectedResults.size})
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// HOME SCREEN
// ─────────────────────────────────────────────
function HomeScreen({ companies, visits, territory, setTerritory, onMode, recent }) {
  const today = todayStr();
  const hot   = companies.filter(c=>c.status==='Hot Lead').length;
  const warm  = companies.filter(c=>c.status==='Warm Lead').length;
  const custs = companies.filter(c=>c.status==='Customer').length;
  const due   = companies.filter(c=>c.followUpDate && c.followUpDate<=today && !['Not Interested','Not Canvassable','Wrong Business'].includes(c.status)).length;
  const notVis= companies.filter(c=>c.status==='Not Visited').length;

  return (
    <div className="screen" style={{ padding:'16px 14px 90px' }}>
      <div style={{ textAlign:'center', marginBottom:20, paddingTop:8 }}>
        <div style={{ fontSize:30, fontWeight:900, color:'#1e3a5f', letterSpacing:-1, lineHeight:1 }}>🏗 RoofRoute</div>
        <div style={{ fontSize:13, color:'#64748b', marginTop:4 }}>Find roofers. Route smarter. Follow up faster.</div>
      </div>

      <div className="card" style={{ marginBottom:12 }}>
        <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.8, marginBottom:8 }}>🗺 Where are you hunting today?</div>
        <input className="field-input" type="text" value={territory} onChange={e=>setTerritory(e.target.value)}
          placeholder="Enter city or area..." style={{ marginBottom: recent.length ? 10 : 0 }} />
        {recent.length > 0 && (
          <div style={{ display:'flex', gap:7, flexWrap:'wrap' }}>
            {recent.map(t=>(
              <button key={t} onClick={()=>setTerritory(t)}
                style={{ padding:'7px 13px', borderRadius:20, background: territory===t ? '#dbeafe':'#f1f5f9', color: territory===t ? '#1d4ed8':'#374151', border: territory===t ? '1.5px solid #93c5fd':'1.5px solid #e5e7eb', fontSize:13, fontWeight:700, cursor:'pointer' }}>
                {t}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14 }}>
        {[
          { id:'city',      icon:'🏙', label:'City Search',    color:'#2563eb', bg:'#2563eb' },
          { id:'nearby',    icon:'📍', label:'Nearby Me',      color:'white',   bg:'#f97316' },
          { id:'suggested', icon:'🎯', label:'Suggested',      color:'#1e3a5f', bg:'#e0f2fe', tc:'#0369a1' },
          { id:'followups', icon:'🔔', label: due>0 ? `Follow-Ups (${due})` : 'Follow-Ups', color:'white', bg: due>0 ? '#16a34a' : '#64748b' },
        ].map(m=>(
          <button key={m.id} className="btn" onClick={()=>onMode(m.id)}
            style={{ background:m.bg, color:m.tc||'white', flexDirection:'column', gap:5, minHeight:76, fontSize:14 }}>
            <span style={{ fontSize:26 }}>{m.icon}</span>
            {m.label}
          </button>
        ))}
      </div>

      <div className="card">
        <div style={{ fontSize:11, fontWeight:800, color:'#94a3b8', textTransform:'uppercase', letterSpacing:0.8, marginBottom:12 }}>📊 Territory Snapshot</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
          {[
            { label:'Companies',   val:companies.length, color:'#2563eb' },
            { label:'Visits',      val:visits.length,    color:'#7c3aed' },
            { label:'Not Visited', val:notVis,           color:'#94a3b8' },
            { label:'Hot Leads',   val:hot,              color:'#dc2626' },
            { label:'Warm Leads',  val:warm,             color:'#d97706' },
            { label:'Follow-Ups',  val:due,              color:'#16a34a' },
            { label:'Customers',   val:custs,            color:'#15803d' },
            { label:'Spoke',       val:visits.filter(v=>v.spoke).length, color:'#0891b2' },
            { label:'Today',       val:visits.filter(v=>v.visitDate&&v.visitDate.startsWith(today)).length, color:'#7c3aed' },
          ].map(s=>(
            <div key={s.label} style={{ background:'#f8fafc', borderRadius:10, padding:'10px 4px', textAlign:'center' }}>
              <div style={{ fontSize:22, fontWeight:800, color:s.color, lineHeight:1 }}>{s.val}</div>
              <div style={{ fontSize:10, color:'#94a3b8', fontWeight:700, marginTop:2 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPANY CARD
// ─────────────────────────────────────────────
function CompanyCard({ company, onSelect }) {
  const days = daysAgo(company.lastVisit);
  const dueToday = company.followUpDate && company.followUpDate <= todayStr();
  const lc = statusColor(company.status);

  return (
    <div onClick={()=>onSelect(company)}
      style={{ background:'white', borderRadius:14, padding:'13px 14px', marginBottom:10,
        boxShadow:'0 1px 4px rgba(0,0,0,0.08)', borderLeft:`4px solid ${lc}`, cursor:'pointer',
        display:'flex', alignItems:'center', gap:12 }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:3 }}>
          <div style={{ fontWeight:800, fontSize:15, color:'#1e293b', lineHeight:1.25, flex:1 }}>{company.companyName}</div>
          <StatusBadge status={company.status} sm />
        </div>
        <div style={{ color:'#64748b', fontSize:13, marginBottom:5 }}>{company.streetAddress}, {company.city}</div>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
          {company.accessType && company.accessType!=='Unknown' && (
            <span style={{ fontSize:11, color:'#64748b', background:'#f1f5f9', padding:'2px 8px', borderRadius:10, fontWeight:600 }}>{company.accessType}</span>
          )}
          {company.supplier && (
            <span style={{ fontSize:11, color:'#7c3aed', background:'#f5f3ff', padding:'2px 8px', borderRadius:10, fontWeight:600 }}>📦 {company.supplier}</span>
          )}
          {company.attemptCount > 0 && (
            <span style={{ fontSize:11, color:'#94a3b8' }}>
              {company.attemptCount} visit{company.attemptCount!==1?'s':''}{days!==null ? ` · ${days===0?'Today':days+'d ago'}` : ''}
            </span>
          )}
          {dueToday && (
            <span style={{ fontSize:11, background:'#fef9c3', color:'#854d0e', padding:'2px 8px', borderRadius:10, fontWeight:700 }}>📅 Due today</span>
          )}
        </div>
      </div>
      <div style={{ color:'#cbd5e1', fontSize:18, flexShrink:0 }}>›</div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ROUTE SCREEN
// ─────────────────────────────────────────────
function RouteScreen({ companies, territory, onSelect, onAdd, onSearch }) {
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');

  const filters = ['All','Not Visited','Hot Lead','Warm Lead','Follow Up','No Contact','Revisit Later','Customer'];

  const list = useMemo(() => {
    let l = [...companies];
    if (territory) {
      const q = territory.toLowerCase();
      l = l.filter(c =>
        c.city.toLowerCase().includes(q) ||
        c.streetAddress.toLowerCase().includes(q) ||
        c.state.toLowerCase().includes(q) ||
        `${c.city} ${c.state}`.toLowerCase().includes(q)
      );
    }
    if (filter !== 'All') l = l.filter(c => c.status === filter);
    if (search) {
      const q = search.toLowerCase();
      l = l.filter(c => c.companyName.toLowerCase().includes(q) || c.streetAddress.toLowerCase().includes(q) || c.city.toLowerCase().includes(q));
    }
    return l.sort((a,b) => (STATUS_PRIORITY[a.status]??99)-(STATUS_PRIORITY[b.status]??99));
  }, [companies, territory, filter, search]);

  return (
    <div className="screen">
      <div style={{ background:'white', padding:'10px 12px 8px', borderBottom:'1px solid #f1f5f9', position:'sticky', top:0, zIndex:10 }}>
        <input className="field-input" type="search" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={territory ? `Search in ${territory}...` : 'Search all companies...'}
          style={{ marginBottom:10 }} />
        <div style={{ display:'flex', gap:7, overflowX:'auto', paddingBottom:2 }}>
          {filters.map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{ flexShrink:0, padding:'7px 14px', borderRadius:20, fontSize:12, fontWeight:700, border:'none', cursor:'pointer',
                background: filter===f ? '#2563eb' : '#f1f5f9', color: filter===f ? 'white' : '#374151' }}>
              {f}
              {f!=='All' && companies.filter(c=>c.status===f).length > 0 && (
                <span style={{ marginLeft:5, fontSize:11, opacity:0.8 }}>({companies.filter(c=>c.status===f).length})</span>
              )}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding:'12px 12px 90px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, color:'#94a3b8', fontWeight:600 }}>
            {list.length} compan{list.length!==1?'ies':'y'}{territory ? ` · ${territory}` : ''}
          </span>
          <div style={{ display:'flex', gap: 8 }}>
            <button onClick={onSearch}
              style={{ background:'#f97316', color:'white', border:'none', borderRadius:10, padding:'7px 14px', fontWeight:700, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:5 }}>
              🔍 Search
            </button>
            <button onClick={onAdd}
              style={{ background:'#2563eb', color:'white', border:'none', borderRadius:10, padding:'7px 14px', fontWeight:700, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:5 }}>
              ＋ Add
            </button>
          </div>
        </div>

        {list.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:'#94a3b8' }}>
            <div style={{ fontSize:52, marginBottom:12 }}>🏢</div>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:6 }}>No companies found</div>
            <div style={{ fontSize:14 }}>Try a different filter, or import a list in the More tab</div>
          </div>
        ) : (
          list.map(c => <CompanyCard key={c.id} company={c} onSelect={onSelect} />)
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// DUPLICATE ALERT MODAL
// ─────────────────────────────────────────────
function DuplicateModal({ company, lastVisit, onContinue, onSchedule, onCancel }) {
  const days = daysAgo(lastVisit?.visitDate);
  let title = '⚠️ Prior Contact';
  let color = '#d97706'; let bg = '#fffbeb';
  if (days === 0)  { title='🚨 Already Visited Today!'; color='#dc2626'; bg='#fef2f2'; }
  else if (days<=7){ title='⚠️ Recent Visit — '+days+'d ago'; color='#f97316'; bg='#fff7ed'; }
  if (company.status==='Hot Lead')  { title='🔥 HOT LEAD — Check Notes First'; color='#dc2626'; bg='#fef2f2'; }
  if (company.status==='Customer')  { title='✅ Existing Customer'; color='#15803d'; bg='#f0fdf4'; }

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{ padding:'0 0 8px' }}>
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 6px' }}>
          <div style={{ width:36, height:4, borderRadius:2, background:'#e2e8f0' }} />
        </div>
        <div style={{ padding:'0 16px 16px' }}>
          <div style={{ background:bg, border:`2px solid ${color}`, borderRadius:14, padding:'14px 16px', marginBottom:16 }}>
            <div style={{ color, fontSize:17, fontWeight:800 }}>{title}</div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:14 }}>
            <InfoTile label="Last Visit" value={lastVisit ? fmtDate(lastVisit.visitDate) : 'N/A'} />
            <InfoTile label="Attempts" value={company.attemptCount||0} />
            <InfoTile label="Last Contact" value={company.lastContact||'None'} />
            <InfoTile label="Title" value={company.contactTitle||'Unknown'} />
            <InfoTile label="Interest" value={company.interest||'Unknown'} />
            <InfoTile label="Supplier" value={company.supplier||'Unknown'} />
          </div>

          {company.status && (
            <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap' }}>
              <StatusBadge status={company.status} />
            </div>
          )}

          {company.notes && (
            <div style={{ background:'#fffbeb', borderRadius:10, padding:'10px 12px', marginBottom:14, border:'1px solid #fde68a' }}>
              <div style={{ fontSize:10, fontWeight:800, color:'#92400e', textTransform:'uppercase', marginBottom:4 }}>Last Notes</div>
              <div style={{ fontSize:14, color:'#78350f' }}>{company.notes}</div>
            </div>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <button className="btn btn-primary" onClick={onContinue} style={{ minHeight:54 }}>✅ Continue Visit</button>
            <button className="btn btn-outline" onClick={onSchedule} style={{ minHeight:50 }}>📅 Schedule Follow-Up</button>
            <button className="btn btn-gray" onClick={onCancel}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// VISIT LOG MODAL
// ─────────────────────────────────────────────
function VisitLogModal({ company, onSave, onClose }) {
  const [step, setStep] = useState('spoke');
  const [contactName, setContactName] = useState('');
  const [title, setTitle] = useState('');
  const [interest, setInterest] = useState('');
  const [supplier, setSupplier] = useState(company.supplier||'');
  const [followUpDate, setFollowUpDate] = useState('');
  const [notes, setNotes] = useState('');

  const saveNoSpoke = (outcome) => {
    const visit = {
      id:genId(), companyId:company.id,
      companyName:company.companyName,
      address:`${company.streetAddress}, ${company.city}`,
      visitDate:new Date().toISOString(), spoke:false,
      contactName:'', title:'', outcome, interest:'',
      supplier:'', followUpDate:'', notes
    };
    onSave(visit, outcome, '', '', '', '', notes);
  };

  const saveYes = () => {
    if (!interest) return;
    const newStatus = interest==='Hot' ? 'Hot Lead' : interest==='Warm' ? 'Warm Lead' : interest==='Not Interested' ? 'Not Interested' : 'Follow Up';
    const visit = {
      id:genId(), companyId:company.id,
      companyName:company.companyName,
      address:`${company.streetAddress}, ${company.city}`,
      visitDate:new Date().toISOString(), spoke:true,
      contactName, title, outcome:newStatus, interest,
      supplier, followUpDate, notes
    };
    onSave(visit, newStatus, contactName, title, supplier, followUpDate, notes);
  };

  const INTEREST_CONFIG = [
    { val:'Hot', icon:'🔥', label:'Hot', color:'#dc2626', sel:'#fef2f2', selBorder:'#dc2626' },
    { val:'Warm', icon:'☀️', label:'Warm', color:'#d97706', sel:'#fffbeb', selBorder:'#d97706' },
    { val:'Cold', icon:'❄️', label:'Cold', color:'#3b82f6', sel:'#eff6ff', selBorder:'#3b82f6' },
    { val:'Not Interested', icon:'🚫', label:'Not Int.', color:'#374151', sel:'#f9fafb', selBorder:'#374151' },
  ];

  return (
    <div className="modal-full">
      <div style={{ background:'#1e3a5f', color:'white', padding:'14px 16px', display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
        <button onClick={onClose} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'white', borderRadius:10, padding:'7px 13px', fontSize:15, cursor:'pointer', fontWeight:700 }}>✕</button>
        <div>
          <div style={{ fontWeight:800, fontSize:17 }}>Log Visit</div>
          <div style={{ fontSize:13, opacity:0.75 }}>{company.companyName}</div>
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:16 }}>
        {step==='spoke' && (
          <div>
            <div style={{ fontSize:22, fontWeight:900, color:'#1e293b', marginBottom:6, marginTop:4 }}>Did you speak with someone?</div>
            <div style={{ fontSize:14, color:'#64748b', marginBottom:24 }}>{company.streetAddress}, {company.city}</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
              <button className="btn btn-green" onClick={()=>setStep('yes')} style={{ minHeight:110, flexDirection:'column', gap:8, fontSize:17 }}>
                <span style={{ fontSize:40 }}>✅</span>YES — Spoke
              </button>
              <button className="btn btn-red" onClick={()=>setStep('no')} style={{ minHeight:110, flexDirection:'column', gap:8, fontSize:17 }}>
                <span style={{ fontSize:40 }}>❌</span>NO Contact
              </button>
            </div>
          </div>
        )}

        {step==='no' && (
          <div>
            <div style={{ fontSize:20, fontWeight:900, color:'#1e293b', marginBottom:16 }}>What happened?</div>
            <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:16 }}>
              {NO_SPOKE_OUTCOMES.map(o=>(
                <button key={o} className="btn btn-outline" onClick={()=>saveNoSpoke(o)} style={{ justifyContent:'flex-start', minHeight:54, fontSize:15 }}>
                  {o}
                </button>
              ))}
            </div>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#64748b', textTransform:'uppercase', marginBottom:6 }}>Quick Note (optional)</div>
              <textarea className="field-input" value={notes} onChange={e=>setNotes(e.target.value)}
                placeholder="e.g. Office locked, try mornings..."
                style={{ resize:'none', minHeight:80 }} />
            </div>
            <button className="btn btn-gray" onClick={()=>setStep('spoke')} style={{ width:'100%' }}>← Back</button>
          </div>
        )}

        {step==='yes' && (
          <div>
            <div style={{ fontSize:20, fontWeight:900, color:'#1e293b', marginBottom:16 }}>Contact Details</div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6 }}>Name (optional)</div>
              <input className="field-input" type="text" value={contactName} onChange={e=>setContactName(e.target.value)} placeholder="Contact name..." />
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:8 }}>Their Title</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                {CONTACT_TITLES.map(t=>(
                  <button key={t} onClick={()=>setTitle(prev=>prev===t?'':t)}
                    style={{ padding:'11px 16px', borderRadius:10, border:`2px solid ${title===t?'#2563eb':'#e5e7eb'}`, background:title===t?'#dbeafe':'white', color:title===t?'#1d4ed8':'#374151', fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit' }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:8 }}>Interest Level <span style={{ color:'#ef4444' }}>*</span></div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
                {INTEREST_CONFIG.map(i=>{
                  const sel = interest===i.val;
                  return (
                    <button key={i.val} onClick={()=>setInterest(i.val)}
                      style={{ padding:14, borderRadius:12, border:`2.5px solid ${sel?i.selBorder:'#e5e7eb'}`, background:sel?i.sel:'white',
                        color:sel?i.color:'#374151', fontWeight:800, fontSize:15, cursor:'pointer', fontFamily:'inherit',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                      {i.icon} {i.label}
                    </button>
                  );
                })}
              </div>
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6 }}>Their Current Supplier</div>
              <input className="field-input" type="text" value={supplier} onChange={e=>setSupplier(e.target.value)} placeholder="e.g. ABC Metals, Southeast Supply..." />
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6 }}>Follow-Up Date (optional)</div>
              <input className="field-input" type="date" value={followUpDate} onChange={e=>setFollowUpDate(e.target.value)} />
            </div>

            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#64748b', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6 }}>Notes</div>
              <textarea className="field-input" value={notes} onChange={e=>setNotes(e.target.value)}
                placeholder="Key takeaways, what they said, what they need..."
                style={{ resize:'none', minHeight:90 }} />
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:10, paddingBottom:16 }}>
              <button className="btn btn-primary" onClick={saveYes} disabled={!interest}
                style={{ minHeight:56, fontSize:17, opacity:interest?1:0.45 }}>
                💾 Save Visit
              </button>
              <button className="btn btn-gray" onClick={()=>setStep('spoke')}>← Back</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// POST VISIT MODAL
// ─────────────────────────────────────────────
function PostVisitModal({ company, visit, onSkip, onFollowUp }) {
  const hasEmail = !!company.email;
  const body = encodeURIComponent(
    `Hi ${visit.contactName||'[Name]'},\n\nIt was great speaking with you today at ${company.companyName}.\n\nWe manufacture metal roofing panels and accessories locally, including drip edge, ridge cap, pipe boots, trims, and other metal roofing components.\n\nIf you have an upcoming metal roof project, feel free to send it over and we can provide pricing for comparison against your current supplier.\n\nI've attached our price list for reference.\n\nThank you,\nCarlos`
  );
  const sub = encodeURIComponent('Metal Roofing Pricing & Fabrication Info');

  return (
    <div className="modal-overlay">
      <div className="modal-sheet" style={{ padding:'16px 16px 20px' }}>
        <div style={{ textAlign:'center', marginBottom:20 }}>
          <div style={{ fontSize:50 }}>✅</div>
          <div style={{ fontSize:21, fontWeight:900, color:'#1e293b', margin:'8px 0 4px' }}>Visit Saved!</div>
          <div style={{ fontSize:14, color:'#64748b' }}>{company.companyName}</div>
          {visit.interest && <div style={{ marginTop:8 }}><StatusBadge status={visit.outcome} /></div>}
        </div>

        <div style={{ fontSize:14, fontWeight:800, color:'#1e293b', marginBottom:12 }}>What's next?</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {hasEmail ? (
            <a href={`mailto:${company.email}?subject=${sub}&body=${body}`} onClick={onSkip}
              style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, background:'#2563eb', color:'white', borderRadius:12, padding:16, textDecoration:'none', fontWeight:800, fontSize:16, minHeight:54 }}>
              ✉️ Send Follow-Up Email
            </a>
          ) : (
            <div style={{ background:'#f1f5f9', borderRadius:12, padding:14, textAlign:'center', fontSize:14, color:'#94a3b8' }}>No email on file — add it to email later</div>
          )}
          <button className="btn btn-outline" onClick={onFollowUp} style={{ minHeight:52, fontSize:15 }}>📅 Set Follow-Up Reminder</button>
          <button className="btn btn-gray" onClick={onSkip} style={{ minHeight:50 }}>⏭ Skip — Next Company</button>
        </div>
      </div>
    </div>
  );
}
